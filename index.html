<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>龙虾海底跑酷</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap');

      :root {
        color-scheme: dark;
        font-family: 'Nunito', 'Segoe UI', 'Microsoft YaHei', sans-serif;
        background:
          radial-gradient(circle at top, rgba(155, 212, 255, 0.24), transparent 30%),
          linear-gradient(180deg, #041a2f 0%, #083b67 55%, #0e5f96 100%);
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 15% 10%, rgba(255, 255, 255, 0.18), transparent 20%),
          radial-gradient(circle at 85% 15%, rgba(100, 223, 223, 0.14), transparent 24%),
          linear-gradient(180deg, #041a2f 0%, #083b67 55%, #0e5f96 100%);
        overscroll-behavior: none;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #app {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        touch-action: none;
        border-radius: 28px;
        outline: 1px solid rgba(155, 212, 255, 0.28);
        box-shadow:
          0 30px 80px rgba(2, 12, 24, 0.55),
          0 0 0 1px rgba(244, 248, 255, 0.06) inset;
        background: linear-gradient(180deg, #041a2f 0%, #083b67 55%, #0e5f96 100%);
      }

      @media (max-width: 768px) {
        canvas {
          border-radius: 16px;
          outline-width: 0;
          box-shadow: 0 16px 40px rgba(2, 12, 24, 0.35);
        }
      }
      html[data-platform='desktop'] body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #041a2f 0%, #0a4471 100%);
      }

      html[data-platform='desktop'] #app {
        width: 100vw;
        height: 100vh;
      }

      html[data-platform='desktop'] canvas {
        width: auto !important;
        height: 100vh !important;
        max-width: 100vw;
        max-height: 100vh;
        border-radius: 0;
        outline: none;
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
